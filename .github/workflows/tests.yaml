on:
   push:
      branches:
         - main
   pull_request:

name: Tests

jobs:
   gradle:
      strategy:
         matrix:
            os: [ubuntu-latest]
      runs-on: ${{ matrix.os }}
      steps:
         - uses: actions/checkout@v4
         - uses: actions/setup-java@v4
           with:
               distribution: temurin
               java-version: 21

         - name: Setup Gradle
           uses: gradle/actions/setup-gradle@v4

         - name: Download Teamtype
           uses: robinraju/release-downloader@v1
           with:
              repository: teamtype/teamtype
              tag: v0.9.1
              fileName: teamtype-x86_64-unknown-linux-musl.tar.gz
              extract: true

         - name: Execute Gradle tests
           run: |
              export PATH=$PATH:$(pwd)
              ./gradlew test --rerun
